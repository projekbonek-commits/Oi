name: Build Android APK (Capacitor)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Mengizinkan build manual lewat tombol di GitHub Actions

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode dari repositori
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java JDK 17 (Wajib untuk Gradle modern Android)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Android SDK Environment
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 5. Install dependensi Node (Capacitor CLI & Core)
      - name: Install Dependencies
        run: npm install

      # 6. Mempersiapkan folder aset web statis (www)
      - name: Build Web Assets (PnP)
        run: npm run build-web

      # 7. Tambahkan platform Android secara dinamis jika belum ada
      - name: Initialize Android Platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            echo "Membuat platform Android baru..."
            npx cap add android
          else
            echo "Platform Android sudah ada."
          fi

      # 8. Sinkronisasi aset HTML ke dalam folder Android Capacitor
      - name: Sync Assets to Android
        run: npx cap sync android

      # 9. Membangun APK menggunakan Gradle Wrapper Android
      - name: Build Debug APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 10. Unggah hasil APK ke Artifacts GitHub sehingga bisa diunduh
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-efootball-poco-f4
          path: android/app/build/outputs/apk/debug/app-debug.apk
